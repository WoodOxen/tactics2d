name: Test Modules

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  authorize-test-modules:
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check whether test run is allowed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('allowed', 'true');
              core.setOutput('reason', 'workflow_dispatch');
              return;
            }

            const pullRequest = context.payload.pull_request;
            const prAuthor = pullRequest.user?.login;
            const isInternalPr = pullRequest.head?.repo?.full_name === `${owner}/${repo}`;
            const isDependabotPr = prAuthor === 'dependabot[bot]';

            if (isInternalPr || isDependabotPr) {
              core.setOutput('allowed', 'true');
              core.setOutput('reason', isInternalPr ? 'internal-pr' : 'dependabot-pr');
              return;
            }

            const hasSafeLabel = (pullRequest.labels || []).some(label => label.name === 'safe-to-test');
            if (!hasSafeLabel) {
              core.setOutput('allowed', 'false');
              core.setOutput('reason', 'no-safe-label');
              return;
            }

            const { data: events } = await github.rest.issues.listEvents({
              owner,
              repo,
              issue_number: pullRequest.number,
              per_page: 100,
            });

            const latestSafeLabelEvent = [...events]
              .reverse()
              .find(event => event.event === 'labeled' && event.label?.name === 'safe-to-test');

            if (!latestSafeLabelEvent?.actor?.login) {
              core.setOutput('allowed', 'false');
              core.setOutput('reason', 'no-safe-label-actor');
              return;
            }

            const labeler = latestSafeLabelEvent.actor.login;
            const { data: permissionData } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: labeler,
            });

            const allowedPermissions = new Set(['admin', 'maintain', 'write']);
            const allowed = allowedPermissions.has(permissionData.permission);

            core.setOutput('allowed', allowed ? 'true' : 'false');
            core.setOutput('reason', allowed ? `safe-label-by-${labeler}` : `unsafe-label-by-${labeler}`);

  test-modules:
    needs: [authorize-test-modules]
    if: needs.authorize-test-modules.outputs.allowed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-22.04', 'ubuntu-24.04', 'macos-latest', 'windows-latest']
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        exclude:
          - os: windows-latest
            python-version: '3.8'
          - os: windows-latest
            python-version: '3.9'
    runs-on: ${{ matrix.os }}
    env:
      MPLBACKEND: Agg
      PYTHON_SKIP_TKINTER: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Check out private repository WoodOxen/trajectory_data_analysis
        uses: actions/checkout@v4
        with:
          repository: WoodOxen/trajectory_data_analysis
          token: ${{ secrets.TRAJ_DATA_SCP }}
          path: tactics2d/data

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies on all platforms
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run Pytest
        run: |
          mkdir -p ./tests/runtime
          pytest tests --cov=tactics2d --cov-report=xml

      - name: Upload coverage to Codecov (Ubuntu only)
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  test-legacy-ubuntu:
    needs: [authorize-test-modules]
    if: needs.authorize-test-modules.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ['ubuntu:18.04', 'ubuntu:20.04']
        python-version: ['3.8', '3.9']
        exclude:
          - image: 'ubuntu:18.04'
            python-version: '3.9'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Check out private repository WoodOxen/trajectory_data_analysis
        uses: actions/checkout@v4
        with:
          repository: WoodOxen/trajectory_data_analysis
          token: ${{ secrets.TRAJ_DATA_SCP }}
          path: tactics2d/data

      - name: Make runtime directory
        run: |
          mkdir -p ./tests/runtime/
          echo $GITHUB_WORKSPACE

      - name: Run tests in Docker (${{ matrix.image }})
        run: |
          docker pull ${{ matrix.image }}
          docker run --rm \
            -v $GITHUB_WORKSPACE:/tactics2d \
            ${{ matrix.image }} \
            /bin/bash -c '
              export DEBIAN_FRONTEND=noninteractive && \
              apt-get update && \
              apt-get install -y software-properties-common curl git && \
              if [[ "${{ matrix.image }}" == "ubuntu:18.04" ]]; then add-apt-repository -y ppa:deadsnakes/ppa; fi && \
              apt-get update && \
              apt-get install -y python${{ matrix.python-version }} python3-pip python${{ matrix.python-version }}-dev build-essential cmake && \
              cd /tactics2d && \
              python${{ matrix.python-version }} -m pip install --upgrade pip && \
              pip install -v .[test] && \
              python${{ matrix.python-version }} -m pytest tests'
